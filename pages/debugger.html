<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Debugger Arena — MultitaskCoder</title>
  <meta name="description" content="Spot the bug in short C, Python, and Java snippets and learn why each fix works.">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MultitaskCoder">
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="icon" href="../assets/icons/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="min-h-screen bg-[#0a0d14] text-slate-100 transition-colors surface-page app-shell">
    <header class="sticky top-0 z-40 flex items-center justify-between gap-3 px-4 py-3 backdrop-blur-xl border-b bg-[#0a0d14]/80 border-white/10 surface-panel">
      <a href="../index.html" class="flex h-11 w-11 items-center justify-center rounded-xl bg-indigo-600 text-white shadow-lg shadow-indigo-600/30 logo-3d" aria-label="MultitaskCoder home">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-terminal" aria-hidden="true">
          <path d="M12 19h8"></path>
          <path d="m4 17 6-6-6-6"></path>
        </svg>
      </a>
      <div class="flex items-center gap-3 rounded-full border px-3 py-1.5 bg-white/[0.03] border-white/10 surface-panel">
        <div class="flex h-7 w-7 items-center justify-center rounded-md bg-amber-500/15 text-amber-400">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-bot" aria-hidden="true">
            <path d="M12 8V4H8"></path>
            <rect width="16" height="12" x="4" y="8" rx="2"></rect>
            <path d="M2 14h2"></path>
            <path d="M20 14h2"></path>
            <path d="M15 13v2"></path>
            <path d="M9 13v2"></path>
          </svg>
        </div>
        <div class="flex flex-col leading-none">
          <div class="flex items-center gap-6 text-xs font-semibold">
            <span id="levelLabel">Lvl 1</span>
            <span id="xpLabel" class="text-slate-400 text-muted">10 XP</span>
          </div>
          <div class="mt-1 h-1 w-28 overflow-hidden rounded-full bg-white/10">
            <div id="xpBar" class="h-full w-1/5 rounded-full bg-indigo-500 xp-bar-fill"></div>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button id="themeToggleBtn" aria-label="Toggle theme" class="flex h-11 w-11 items-center justify-center rounded-xl border bg-white/[0.03] border-white/10 surface-panel btn-3d">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sun" aria-hidden="true" id="themeIcon">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2"></path>
            <path d="M12 20v2"></path>
            <path d="m4.93 4.93 1.41 1.41"></path>
            <path d="m17.66 17.66 1.41 1.41"></path>
            <path d="M2 12h2"></path>
            <path d="M20 12h2"></path>
            <path d="m6.34 17.66-1.41 1.41"></path>
            <path d="m19.07 4.93-1.41 1.41"></path>
          </svg>
        </button>
        <button id="menuToggleBtn" aria-label="Open menu" aria-expanded="false" class="flex h-11 w-11 items-center justify-center rounded-xl border bg-white/[0.03] border-white/10 surface-panel btn-3d">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-menu" aria-hidden="true">
            <path d="M4 5h16"></path>
            <path d="M4 12h16"></path>
            <path d="M4 19h16"></path>
          </svg>
        </button>
      </div>
    </header>

    <div id="navOverlay" class="nav-overlay"></div>
    <nav id="navDrawer" class="nav-drawer surface-panel" aria-label="Site navigation">
      <div class="nav-drawer-head">
        <span class="nav-drawer-title">Menu</span>
        <button id="navCloseBtn" class="btn-3d nav-close-btn" aria-label="Close menu">&times;</button>
      </div>
      <a href="../index.html" class="nav-drawer-link">Home</a>
      <a href="./theory.html" class="nav-drawer-link">Theory Reference</a>
      <a href="./typing.html" class="nav-drawer-link">Speed Typing</a>
      <a href="./debugger.html" class="nav-drawer-link">Debugger Arena</a>
      <a href="./quizzes.html" class="nav-drawer-link">Brain Quizzes</a>
      <a href="./analytics.html" class="nav-drawer-link">Performance Analytics</a>
    </nav>
    <main class="app-container">
      <a href="../index.html" class="app-back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg>
        Back to home
      </a>
      <div class="app-page-head">
        <div class="app-page-icon bg-rose-500"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20v-9"></path><path d="M14 7a4 4 0 0 1 4 4v3a6 6 0 0 1-12 0v-3a4 4 0 0 1 4-4z"></path><path d="M14.12 3.88 16 2"></path><path d="M21 21a4 4 0 0 0-3.81-4"></path><path d="M21 5a4 4 0 0 1-3.55 3.97"></path><path d="M22 13h-4"></path><path d="M3 21a4 4 0 0 1 3.81-4"></path><path d="M3 5a4 4 0 0 0 3.55 3.97"></path><path d="M6 13H2"></path><path d="m8 2 1.88 1.88"></path><path d="M9 7.13V6a3 3 0 1 1 6 0v1.13"></path></svg></div>
        <div>
          <h1 class="app-page-title">Debugger Arena</h1>
          <p class="app-page-sub">Spot the bug. Ship the fix.</p>
        </div>
      </div>
      <div class="app-panel">
        <div class="app-grid-3" style="margin-bottom:1rem;">
          <div class="app-stat"><div class="app-stat-value" id="statProgress">1 / 8</div><div class="app-stat-label">Snippet</div></div>
          <div class="app-stat"><div class="app-stat-value" id="statCorrect">0</div><div class="app-stat-label">Correct</div></div>
          <div class="app-stat"><div class="app-stat-value" id="statAccuracy">—</div><div class="app-stat-label">Accuracy</div></div>
        </div>

        <p class="text-sm text-muted" style="margin-bottom:0.75rem;">Click the line you think contains the bug in this <span id="snippetLang" style="font-weight:700;"></span> snippet.</p>
        <div class="app-code-block" id="debugCode" style="white-space:normal;"></div>

        <div id="debugFeedback" style="display:none; margin-top:1rem; padding:0.9rem 1rem; border-radius:0.75rem; background:rgba(255,255,255,0.04);">
          <p class="text-sm font-bold" id="debugFeedbackTitle"></p>
          <p class="text-sm text-muted" id="debugFeedbackText" style="margin-top:0.25rem;"></p>
        </div>

        <div style="margin-top:1.1rem; display:flex; gap:0.6rem;">
          <button class="app-btn" id="nextBtn" style="display:none;">Next snippet</button>
        </div>
      </div>

      <div class="app-panel" id="finalPanel" style="display:none; text-align:center;">
        <h2 class="text-lg font-bold mb-1">Arena complete 🏁</h2>
        <p class="text-sm text-muted" id="finalSummary"></p>
        <p class="text-sm font-bold" style="color:#4ade80; margin-top:0.4rem;" id="finalXp"></p>
        <button class="app-btn" id="restartBtn" style="margin-top:1rem;">Play again</button>
      </div>

    </main>
  </div>
  <script src="../script.js"></script>
  <script src="./debugger.js"></script>
</body>
</html>
